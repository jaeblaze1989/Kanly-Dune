name: Create GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          ## Kanly Manager v${{ steps.resolve.outputs.tag }}

          ### Highlights
          - Dockerized Kanly Manager with one-command setup script.
          - Dashboard, Players, INI Editor, Database, and Server Commands views.
          - Parsed command output rendering and player status indicators.
          - User-focused README and explicit project licensing.

          ### Install
          ```bash
          git clone https://github.com/jaeblaze1989/Kanly-Dune.git
          cd Kanly-Dune/services/kanly-admin
          chmod +x setup-docker.sh
          ./setup-docker.sh install
          ```
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: Kanly Manager ${{ steps.resolve.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
